# .github/workflows/terraform.yml
name: Terraform Multi-Environment Pipeline

on:
  push:
    branches:
      - develop     # → TST
      - staging     # → STG
      - main        # → PRD
    paths:
      - 'environments/**'
    
  pull_request:
    branches:
      - develop
      - staging
      - main
    paths:
      - 'environments/**'
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options:
          - develop
          - staging
          - main          


permissions:
  id-token: write
  contents: read
  pull-requests: write

# ──────────────────────────────────────────────
# REUSABLE ENV MATRIX
# ──────────────────────────────────────────────
env:
  ARM_CLIENT_ID: ${{ secrets.IB_CLIENTID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.IB_SUB }}
  ARM_TENANT_ID: ${{ secrets.IB_TENANT }}
  ARM_USE_OIDC: "true"
  TF_VERSION: "~1.7"
  WD: "terraform/STG"

