# .github/workflows/terraform.yml
name: Terraform Multi-Environment Pipeline

on:
  push:
    branches:
      - develop     # → TST
      - staging     # → STG
      - main        # → PRD
    paths:
      - 'environments/**'
    
  pull_request:
    branches:
      - develop
      - staging
      - main
    paths:
      - 'environments/**'
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options:
          - develop
          - staging
          - main          


permissions:
  id-token: write
  contents: read
  pull-requests: write

# ──────────────────────────────────────────────
# REUSABLE ENV MATRIX
# ──────────────────────────────────────────────
env:
  TF_VAR_client_id: ${{ secrets.IB_CLIENT_ID}}
  TF_VAR_subscription_id: ${{ secrets.IB_SUB_441  }}
  TF_VAR_tenant_id: ${{ secrets.IB_TENANT_ID}}
  TF_VAR_sh_vm_user: ${{secrets.SH_VM_USER }}
  TF_VAR_sh_vm_pass: ${{secrets.SH_VM_PASS }}
  TF_VAR_sa_key:  ${{ secrets.SA_KEY }}  
  ARM_USE_OIDC: "true"
  TF_VERSION: "~1.7"
  WD: "terraform/STG"

jobs:

