# .github/workflows/terraform.yml
name: Terraform Multi-Environment Pipeline

on:
  push:
    branches:
      - develop     # → TST
      - staging     # → STG
      - main        # → PRD
    paths:
      - 'environments/**'
    
  pull_request:
    branches:
      - develop
      - staging
      - main
    paths:
      - 'environments/**'
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options:
          - develop
          - staging
          - main          


permissions:
  id-token: write
  contents: read
  pull-requests: write

# ──────────────────────────────────────────────
# REUSABLE ENV MATRIX
# ──────────────────────────────────────────────
env:
  ARM_TENANT_ID: ${{ secrets.IB_TENANT }}
  ARM_USE_OIDC: "true"
  TF_VERSION: "~1.7"

jobs:

# ══════════════════════════════════════════════
# STAGE 0 — VALIDATE & SCAN (all branches)
# ══════════════════════════════════════════════
  validate:
    name:  Validate & Lint
    runs-on: ubuntu-latest
#    strategy:
#      matrix:
#        environment: [tst, stg, prd]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend)
        working-directory: Terraform    # environments/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: Terraform     # environments/${{ matrix.environment }}
        run: terraform validate

