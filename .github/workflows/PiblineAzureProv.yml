on:
  push:
    branches:
      - Develope
      - Feature
      - main
    paths: ['Terraform/**']
  pull_request:     
      branches:
        - Develope
        - Feature
        - main
      paths: ['Terraform/**']
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options:
          - Develope
          - Feature
          - main
     
  
permissions:
 id-token: write
 contents: read
#---------------------
# resuable environment matrix
#---------------------
env:
  ARM_TENANT_ID: ${{ secrets.Tenenat_id }} 
  ARM_USE_OIDC: "true"
  TF_VERSION: "1~1.7"

jobs:
  validate:
     name: validate&Scan
     runs-on: ubuntu-latest
     strategy:
       matrix:
         environment: 
             - TST
             - STG
             - PRD
     steps:
       - uses: actions/checkout@v4
       - run:  |
              echo "there are all repo files from  ${{ inputs.environment }}"
              ls -l
  



 
